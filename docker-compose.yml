version: "3.8"

services:
  localstack:
    image: localstack/localstack:latest
    container_name: localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,ec2,iam,lambda,dynamodb
      - DEFAULT_REGION=us-east-1
      - DEBUG=0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
